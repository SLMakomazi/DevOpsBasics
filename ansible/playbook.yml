---
- name: Prepare Clean AWS Server for Docker App
  hosts: webservers
  become: true

  tasks:
    - name: Purge any legacy broken Docker sources files
      file:
        path: /etc/apt/sources.list.d/docker.sources
        state: absent

    - name: Download system prerequisites and Nginx
      apt:
        name: [apt-transport-https, ca-certificates, curl, software-properties-common, gnupg, nginx]
        state: present
        update_cache: yes

    - name: Create directory for Docker keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Fetch official Docker GPG Key String
      uri:
        url: https://download.docker.com/linux/ubuntu/gpg
        return_content: yes
      register: docker_gpg_key

    - name: Add Docker software repository map (Modern Embedded Method)
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: https://download.docker.com/linux/ubuntu
        suites: "{{ ansible_facts['distribution_release'] }}"
        components: [stable]
        architectures: [amd64]
        # Embedding the actual key content directly guarantees apt reads it perfectly
        signed_by: "{{ docker_gpg_key.content }}"
        state: present

    - name: Install core Docker and Docker Compose
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: yes

    - name: Ensure Docker engine is active
      service:
        name: docker
        state: started
        enabled: yes

    - name: Configure Nginx Free Load Balancer routing traffic
      copy:
        dest: /etc/nginx/sites-available/default
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:3000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:5000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }

    - name: Reload Nginx configurations to go live
      service:
        name: nginx
        state: reloaded