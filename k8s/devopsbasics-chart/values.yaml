# =====================================================================
# 1. GLOBAL REGISTRY SETTINGS
# =====================================================================
# These shared properties make it easy to point both components to 
# your specific GitHub Container Registry namespace.
global:
  registry: ghcr.io
  owner: slmakomazi

# =====================================================================
# 2. BACKEND APPLICATION SETTINGS (Node.js API)
# =====================================================================
backend:
  # The initial number of background pods to run
  replicaCount: 1
  image:
    repository: devopsbasics-backend
    # Jenkins will dynamically override this on the fly using: --set backend.image.tag=${GIT_COMMIT_LONG}
    tag: "latest"
    pullPolicy: Always
  service:
    # ClusterIP makes the backend reachable internally *only* inside the cluster network
    type: ClusterIP
    # The permanent cluster internal port your frontend services will call
    port: 5000
    # The actual port your Java/Python application listens to inside its Dockerfile
    targetPort: 5000

  # FIXED: Health probes are now correctly nested and indented under the backend configuration block
  livenessProbe:
    httpGet:
      path: /api/users
      port: 5000
  readinessProbe:
    httpGet:
      path: /api/users
      port: 5000

# =====================================================================
# 3. FRONTEND APPLICATION SETTINGS (React UI)
# =====================================================================
frontend:
  # The initial number of user-facing pods to run
  replicaCount: 1
  image:
    repository: devopsbasics-frontend
    # Jenkins will dynamically override this on the fly using: --set frontend.image.tag=${GIT_COMMIT_LONG}
    tag: "latest"
    pullPolicy: Always
  service:
    # LoadBalancer instructs your cloud provider (like AKS) to assign a real public IP address
    type: NodePort
    # The standard web traffic entry port exposed to internet browsers
    port: 5173
    # The internal container port where your Nginx/React frontend bundle webserver serves the files
    targetPort: 5173
    nodePort: 30001

# =====================================================================
# 4. DATABASE SETTINGS (PostgreSQL)
# =====================================================================
database:
  image: postgres:16-alpine
  user: "postgres"
  password: "SuperSecurePassword123" # In production, we would use a K8s Secret object
  name: "devopsbasics"
  port: 5432
  persistence:
    enabled: true
    size: 2Gi

# =====================================================================
# 5. STANDARD KUBERNETES BOILERPLATE (Deactivated / Studying Framework)
# =====================================================================
# These configurations remain in place for you to study and experiment with 
# once you expand your infrastructure components.

# Credentials to pull from private registries (not required for public GHCR configurations)
imagePullSecrets: []
# Global naming overrides used by the underlying _helpers.tpl template library
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Dictates if a custom service account identity card should be initialized
  create: true
  automount: true
  annotations: {}
  name: ""

# Placeholders for passing raw operational labels and metadata into live runtime Pods
podAnnotations: {}
podLabels: {}

# Host machine user and group execution permissions constraints
podSecurityContext: {}
securityContext: {}

# Reverse-proxy domain router mapping. Disabled for now while we use standard Services.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: devopsbasics.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Advanced Layer-7 traffic steering engine mapping (Disabled by default)
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - devopsbasics.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

# Resource limit boundaries protecting your underlying host cluster machine hardware node from memory leaks
resources: {}

# The automatic thermostat setup. Set to 'false' so it won't force duplicate pods unexpectedly.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# Persistent cluster storage disk drive mounting properties
volumes: []
volumeMounts: []

# Kubernetes cluster placement variables mapping workloads to specific underlying worker machines
nodeSelector: {}
tolerations: []
affinity: {}