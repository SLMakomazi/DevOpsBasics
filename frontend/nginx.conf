server {
    listen 5173;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 1. CoreDNS cluster IP address to resolve internal hostnames
        resolver 10.152.183.10 valid=10s; 
        
        # 2. Variable prevents [emerg] startup crashes by forcing resolution at runtime
        # Full FQDN string ensures CoreDNS resolves the address inside the devopsbasics namespace
        set $backend_service "http://cluster.local";
        
        proxy_pass $backend_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
