server {
    listen 5173;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # 1. Correct MicroK8s CoreDNS cluster IP address
        resolver 10.152.183.10 valid=10s; 
        
        # 2. Corrected active backend service name inside your devopsbasics namespace
        set $backend_service "http://devops-devopsbasics-chart-backend:5000/";
        
        proxy_pass $backend_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
