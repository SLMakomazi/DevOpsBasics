# The display name of the workflow visible under the 'Actions' tab on GitHub
name: DevOps Basics CI/CD Pipeline

# Triggers: Defines what Git events cause this automation pipeline to fire up
on:
  push:
    # Runs the workflow whenever a commit is pushed to the main branch
    branches: [ argocd ]
  workflow_dispatch:

jobs:
  # Define a single execution unit named 'build-and-deploy'
  build-and-deploy:
    name: Compile Images and Deploy to AWS
    # Specifies that GitHub should provision a fresh Ubuntu Linux VM runner to execute this job
    runs-on: ubuntu-latest
    
    # Explicit security scopes granted to the temporary GITHUB_TOKEN for this specific job
    permissions:
      contents: read     # Necessary to let the runner download and read your codebase
      packages: write    # Crucial permission required to publish artifacts to GHCR

    steps:
      # Step 1: Clone the repository onto the runner filesystem
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Establish an authenticated session with GHCR
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # --- BUILD & PUSH BACKEND ---
      # -----------------------------------------------------------------
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend          # The path context where Docker looks for node files
          file: ./backend/Dockerfile  # Precise location of the blueprint Dockerfile
          push: true                  # Instructs the action to push the built layers to GHCR
          tags: |
            ghcr.io/slmakomazi/devopsbasics-backend:latest
            ghcr.io/slmakomazi/devopsbasics-backend:${{ github.sha }}

      # -----------------------------------------------------------------
      # --- BUILD & PUSH FRONTEND ---
      # -----------------------------------------------------------------
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend          # The path context containing the React source layers
          file: ./frontend/Dockerfile  # Precise location of the frontend multi-stage blueprint
          push: true                   # Upload the final optimized container image layers
          tags: |
            ghcr.io/slmakomazi/devopsbasics-frontend:latest
            ghcr.io/slmakomazi/devopsbasics-frontend:${{ github.sha }}

      # -----------------------------------------------------------------
      # --- AWS PROVISIONING & INFRASTRUCTURE AUTOMATION ---
      # -----------------------------------------------------------------
      - name: Set Up and Link AWS CLI Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Step 1 - Provision Fresh Free-Tier EC2 Instance
        id: ec2
        run: |
          INSTANCE_INFO=$(aws ec2 run-instances \
            --image-id ami-052355af2a014bd2c \
            --count 1 \
            --instance-type t3.micro \
            --key-name my-new-ansible-key \
            --security-group-ids sg-0e3ac73508405243f \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=autospares-prod}]' \
            --query "Instances[0].InstanceId" --output text)
          
          echo "Waiting for instance to initialize..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_INFO
          
          PUBLIC_IP=$(aws ec2 describe-instances --instance-ids $INSTANCE_INFO --query "Reservations.Instances.PublicIpAddress" --output text)
          echo "server_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: Step 2 - Set Up Ansible Environment Engine
        env:
          LIVE_IP: ${{ steps.ec2.outputs.server_ip }}
        run: |
          sudo apt update && sudo apt install -y ansible
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ansible/id_rsa
          chmod 600 ansible/id_rsa
          # Replaces TARGET_IP inside hosts.ini using a safe environment string
          sed -i "s/TARGET_IP/$LIVE_IP/g" ansible/hosts.ini
          echo "Verifying hosts.ini replacement output:"
          cat ansible/hosts.ini

      - name: Step 3 - Run Ansible Playbook to Configure the Server
        run: |
          cd ansible
          ansible-playbook -i hosts.ini playbook.yml

      - name: Step 4 - Connect and Deploy React & Node Application Containers
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.ec2.outputs.server_ip }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/slmakomazi/devopsbasics-frontend:latest || true
            docker pull ghcr.io/slmakomazi/devopsbasics-backend:latest || true
            docker stop $(docker ps -a -q) || true
            docker run -d --restart always -p 5000:5000 ghcr.io/slmakomazi/devopsbasics-backend:latest
            docker run -d --restart always -p 3000:5173 -e BACKEND_SERVICE_URL="http://127.0.0" ghcr.io/slmakomazi/devopsbasics-frontend:latest
